<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <style>
            body {
                height: 100vh;
                background: linear-gradient(135deg, #a8edea, #fed6e3);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1.5rem;
                padding: 1rem;
            }

            .container {
                background: linear-gradient(135deg, #43cea2, #185a9d);
                padding: 2rem;
                border-radius: 1rem;
                box-shadow: 0 8px 16px rgba(0,0,0,0.3);
                width: 100%;
                max-width: 400px;
                color: white;
            }

            .btn-primary {
                background: linear-gradient(135deg, #4facfe, #00f2fe);
                color: white;
                border: none;
                padding: 0.75rem 1.5rem;
                border-radius: 0.5rem;
                font-size: 1rem;
                font-weight: bold;
                display: flex;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                transition: background 0.3s ease;
                margin: 2rem auto 0;
                width: 100%;
            }

            .btn-google {
                background: white;
                color: #333;
                border: 1px solid #e0e0e0;
                padding: 0.75rem 1.5rem;
                border-radius: 0.5rem;
                font-size: 1rem;
                font-weight: bold;
                display: flex;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                transition: background 0.3s ease, box-shadow 0.3s ease;
                margin: 0 auto;
                max-width: 400px;
                width: auto;
                min-width: 280px;
            }

            .btn-google:hover {
                background-color: #f8f8f8;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            }

            .google-icon {
                width: 20px;
                height: 20px;
                margin-right: 0.75rem;
            }

            .register-link {
                color: #4d7aff;
                text-decoration: none;
                font-size: 0.9rem;
            }
            .register-link:hover {
                text-decoration: underline;
            }

            .password-group {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.5rem;
            }

            .forgotPwd-link {
                color: #4da3ff;
                text-decoration: none;
                font-size: 0.9rem;
            }
            .forgotPwd-link:hover {
                text-decoration: underline;
            }

            .field-error {
                display: none;
                color: red;
                font-size: 0.9rem;
                margin-top: 0.25rem;
            }
            .field-error i {
                display: flex;
                align-items: center;
            }
            .field-error i span {
                margin-left: 0.5rem;
            }
            .field-error.show {
                display: block;
            }
            .field-error:hover {
                color: darkred;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2 class="text-center m-3">Login Page</h2>

            <div class="mb-3">
                <label class="form-label" for="username">Username: </label>
                <input class="form-control" type="text" id="Username" placeholder="Your username">
                <div class="field-error" id="err-name">
                    <i class="fas fa-circle-exclamation">
                        <span>Please enter your username</span>
                    </i>
                </div>
            </div>

            <div class="mb-3">
                <div class="password-group">
                    <label class="form-label" for="password">Password:</label>
                    <a href="ForgotPassword.html" class="forgotPwd-link">Forgot Password?</a>
                </div>
                <input class="form-control" type="text" id="Password" placeholder="Your password">
                <div class="field-error" id="err-pwd">
                    <i class="fas fa-circle-exclamation">
                        <span>Please enter your password</span>
                    </i>
                </div>
            </div>
            <button class="btn-primary" id="loginBtn" type="button">
                <span class="spinner" id="spinner"></span>
                <i class="fas fa-paper-plane" id="btnIcon"></i>
                <span id="btnText" class="ms-2">Login</span>
            </button>
        </div>

        <button class="btn-google" type="button">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Continue with Google</span>
        </button>

        <div class="d-flex justify-content-between mt-3">
            <p class="mb-0">Don't have an account?
                <a href="Register.html" class="register-link"> Register now</a>
            </p>
        </div>
    </body>
</html>
