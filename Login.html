<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://accounts.google.com/gsi/client" async defer></script>

        <style>
            body {
                height: 100vh;
                background: linear-gradient(135deg, #a8edea, #fed6e3);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1.5rem;
                padding: 1rem;
            }

            .container {
                background: linear-gradient(135deg, #43cea2, #185a9d);
                padding: 2rem;
                border-radius: 1rem;
                box-shadow: 0 8px 16px rgba(0,0,0,0.3);
                width: 100%;
                max-width: 400px;
                color: white;
            }

            .btn-primary {
                background: linear-gradient(135deg, #4facfe, #00f2fe);
                color: white;
                border: none;
                padding: 0.75rem 1.5rem;
                border-radius: 0.5rem;
                font-size: 1rem;
                font-weight: bold;
                display: flex;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                transition: background 0.3s ease;
                margin: 2rem auto 0;
                width: 100%;
            }

            .register-link {
                color: #4d7aff;
                text-decoration: none;
                font-size: 0.9rem;
            }
            .register-link:hover {
                text-decoration: underline;
            }

            .password-group {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.5rem;
            }

            .forgotPwd-link {
                color: #4da3ff;
                text-decoration: none;
                font-size: 0.9rem;
            }
            .forgotPwd-link:hover {
                text-decoration: underline;
            }

            .field-error {
                display: none;
                color: red;
                font-size: 0.9rem;
                margin-top: 0.25rem;
            }
            .field-error i {
                display: flex;
                align-items: center;
            }
            .field-error i span {
                margin-left: 0.5rem;
            }
            .field-error.show {
                display: block;
            }
            .field-error:hover {
                color: darkred;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2 class="text-center m-3">Login Page</h2>

            <div class="mb-3">
                <label class="form-label" for="username">Username: </label>
                <input class="form-control" type="text" id="Username" placeholder="Your username">
                <div class="field-error" id="err-name">
                    <i class="fas fa-circle-exclamation">
                        <span>Please enter your username</span>
                    </i>
                </div>
            </div>

            <div class="mb-3">
                <div class="password-group">
                    <label class="form-label" for="password">Password:</label>
                    <a href="ForgotPassword.html" class="forgotPwd-link">Forgot Password?</a>
                </div>
                <input class="form-control" type="text" id="Password" placeholder="Your password">
                <div class="field-error" id="err-pwd">
                    <i class="fas fa-circle-exclamation">
                        <span>Please enter your password</span>
                    </i>
                </div>
            </div>
            <button class="btn-primary" id="loginBtn" type="button" onclick="Login()">
                <span class="spinner" id="spinner"></span>
                <i class="fas fa-paper-plane" id="btnIcon"></i>
                <span id="btnText" class="ms-2">Login</span>
            </button>
        </div>

        <div id="googleBtn" class="mt-3"></div>

        <div class="d-flex justify-content-between mt-3">
            <p class="mb-0">Don't have an account?
                <a href="Register.html" class="register-link"> Register now</a>
            </p>
        </div>

        <script>
            function handleCredentialResponse(response) {
                const responsePayLoad = decodeJwtResponse(response.credential);

                console.log("ID: " + responsePayLoad.sub);
                console.log("Full Name: " + responsePayLoad.name);
                console.log("Given Name: " + responsePayLoad.given_name);
                console.log("Family Name: " + responsePayLoad.family_name);
                console.log("Image URL: " + responsePayLoad.picture);
                console.log("Email: " + responsePayLoad.email);

                localStorage.setItem('user', JSON.stringify({
                    name: responsePayLoad.name,
                    email: responsePayLoad.email,
                    picture: responsePayLoad.picture
                }));

                alert('Login successful! Welcome, ' + responsePayLoad.name);
            }

            function decodeJwtResponse(token) {
                let base64Url = token.split('.')[1];
                let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);   
                }).join(''));

                return JSON.parse(jsonPayload);
            }

            window.onload = function () {
                google.accounts.id.initialize({
                    client_id: "614552574068-4l66fpncv1k2qtu0c1jt1edc3t3h88uh.apps.googleusercontent.com",
                    callback: handleCredentialResponse
                });
                google.accounts.id.renderButton(
                    document.getElementById("googleBtn"),
                    { theme: "outline", size: "large", width: 400 }
                );
            }

            document.getElementById('loginBtn').addEventListener('click', function() {

                window.location.href = 'index.html';
            });
        </script>
    </body>
</html>
