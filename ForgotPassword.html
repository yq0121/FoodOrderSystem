<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Forgot Password</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

        <style>
            body {
                height: 100vh;
                background: linear-gradient(135deg, #a8edea, #fed6e3);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1.5rem;
                padding: 1rem;
            }

            .container {
                background: linear-gradient(135deg, #43cea2, #185a9d);
                padding: 2rem;
                border-radius: 1rem;
                box-shadow: 0 8px 16px rgba(0,0,0,0.3);
                width: 100%;
                max-width: 400px;
                color: white;
            }
            
            .btn-reset {
                background: linear-gradient(135deg, #4facfe, #00f2fe);
                color: white;
                border: none;
                padding: 0.75rem 1.5rem;
                border-radius: 0.5rem;
                font-size: 1rem;
                font-weight: bold;
                display: flex;
                cursor: pointer;
                align-items: center;
                justify-content: center;
                transition: background 0.3s ease;
                margin: 2rem auto 0;
                max-width: 400px;
                width: auto;
                min-width: 280px;
            }

            .login-link {
                color: #4d7aff;
                text-decoration: none;
                font-size: 0.9rem;
            }
            .login-link:hover {
                text-decoration: underline;
            }

            .field-error {
                display: none;
                color: red;
                font-size: 0.9rem;
                margin-top: 0.25rem;
            }
            .field-error i {
                display: flex;
                align-items: center;
            }
            .field-error i span {
                margin-left: 0.5rem;
            }
            .field-error.show {
                display: block;
            }
            .field-error:hover {
                color: darkred;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2 class="text-center m-3">Forgot Password</h2>

            <p class="text-center" style="color:red;">Please enter your email address and we will send you a link to reset your password.</p>

            <div class="mb-3">
                <label class="form-label" for="email">Email Address:</label>
                <input class="form-control" type="email" id="email" placeholder="Your email">
                <div class="field-error" id="err-email">
                    <i>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-exclamation-triangle-fill" viewBox="0 0 16 16">
                            <path d="M8.982 1.566a1.13 1.13 0 0 0-1.964 0L.165 13.233c-.457.778.091 1.767.982 1.767h13.707c.89 0 1.438-.99.982-1.767L8.982 1.566zM7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zm.93-4a.905.905 0 1 1-1.81 0l-.003-.217V5a.905.905 0 0 1 .904-.905h.003c.5-.001.906.403.906.904v2z"/>
                        </svg>
                        <span>Please enter a valid email address.</span>
                    </i>
                </div> 
            </div>

            <button class="btn-reset" id="resetBtn" type="button">
                <span class="spinner" id="spinner"></span>
                <i class="fas fa-paper-plane" id="btnIcon"></i>
                <span id="btnText" class="ms-2">Send Reset Link</span>
            </button>
        </div>

        <div class="d-flex justify-content-between mt-3">
            <a href="Login.html" class="login-link">Back to Login</a>
        </div>
    </body>
</html>
